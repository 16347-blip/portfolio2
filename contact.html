<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>ช่องทางการติดต่อ</title>

<style>

body{
    margin:0;
    font-family:"Tahoma";
    text-align:center;
    background:linear-gradient(#7ee8fa,#00bfff,#ffffff);
    min-height:100vh;
    overflow-x:hidden;
    overflow-y:auto;
}

/* ฟองอากาศ */
.bubble{
    position:fixed;
    bottom:-50px;
    background:white;
    opacity:.5;
    border-radius:50%;
    animation:up 8s infinite;
}

.b1{
    width:30px;
    height:30px;
    left:15%;
}

.b2{
    width:20px;
    height:20px;
    left:70%;
    animation-duration:10s;
}

.b3{
    width:25px;
    height:25px;
    left:45%;
    animation-duration:9s;
}

@keyframes up{
    from{transform:translateY(0);}
    to{transform:translateY(-100vh);}
}

/* กล่องข้อมูล */
.card{
    background:white;
    width:380px;
    margin:70px auto;
    padding:30px;
    border-radius:40px;
    box-shadow:0 10px 30px #008dcc;
    position:relative;
    z-index:2;
}

h1{
    color:#008dcc;
}

.info{
    background:#dffaff;
    padding:20px;
    border-radius:20px;
    margin-top:20px;
    text-align:left;
}

.info p{
    font-size:18px;
    margin:15px 0;
}

.info a{
    color:#008dcc;
    text-decoration:none;
}

.info a:hover{
    color:#ff69b4;
}

.back{
    display:inline-block;
    margin-top:25px;
    padding:12px 25px;
    background:#00bfff;
    color:white;
    border-radius:25px;
    text-decoration:none;
}

.back:hover{
    background:#008dcc;
}

/* ปลาดาว */
.star1,.star2{
    position:fixed;
    font-size:40px;
    animation:move 3s ease-in-out infinite;
}

.star1{
    bottom:20px;
    left:8%;
}

.star2{
    bottom:35px;
    right:10%;
    animation-delay:1.5s;
}

/* เปลือกหอย */
.shell1,.shell2{
    position:fixed;
    font-size:32px;
}

.shell1{
    bottom:18px;
    left:25%;
}

.shell2{
    bottom:18px;
    right:28%;
}


/* ขยับเบา ๆ */
@keyframes move{
    0%,100%{
        transform:rotate(-8deg);
    }
    50%{
        transform:rotate(8deg);
    }
}

  /* กองทราย */
.sand{
    position:fixed;
    bottom:0;
    width:100%;
    height:100px;
    background:#F9E79F;
    border-radius:50% 50% 0 0;
    z-index:1;
}

/* คลื่น */
.wave{
    position:fixed;
    bottom:85px;
    width:100%;
    text-align:center;
    font-size:28px;
    animation:wave 2s ease-in-out infinite;
    z-index:0;
}

@keyframes wave{
    0%,100%{transform:translateY(0);}
    50%{transform:translateY(-6px);}
}

/* ปลาดาว */
.star{
    position:fixed;
    font-size:38px;
    animation:spin 5s linear infinite;
}

.star1{bottom:15px;left:8%;}
.star2{bottom:20px;right:10%;}

@keyframes spin{
    from{transform:rotate(0deg);}
    to{transform:rotate(360deg);}
}

/* เปลือกหอย */
.shell{
    position:fixed;
    font-size:34px;
}

.shell1{bottom:15px;left:28%;}
.shell2{bottom:15px;right:30%;}

/* ปู */
.crab{
    position:fixed;
    bottom:15px;
    left:48%;
    font-size:38px;
    animation:walk 6s infinite alternate;
}

@keyframes walk{
    from{transform:translateX(-40px);}
    to{transform:translateX(40px);}
}

/* ปลา */
.fish{
    position:fixed;
    top:150px;
    left:-80px;
    font-size:35px;
    animation:swim 12s linear infinite;
}

@keyframes swim{
    from{left:-80px;}
    to{left:110%;}
}

/* แมงกะพรุน */
.jelly{
    position:fixed;
    right:8%;
    top:120px;
    font-size:35px;
    animation:float 4s ease-in-out infinite;
}

@keyframes float{
    0%,100%{transform:translateY(0);}
    50%{transform:translateY(20px);}
}

/* ปะการัง */
.coral{
    position:fixed;
    bottom:8px;
    left:75%;
    font-size:38px;
}
</style>

</head>
