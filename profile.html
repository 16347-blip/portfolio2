<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>ประวัติส่วนตัว</title>

<style>

body{
    margin:0;
    font-family:"Tahoma";
    text-align:center;
    background:linear-gradient(#7ee8fa,#00bfff,#ffffff);
    min-height:100vh;
    overflow:hidden;
}

/* ฟองอากาศ */
.bubble{
    position:fixed;
    bottom:-50px;
    background:white;
    opacity:.5;
    border-radius:50%;
    animation:up 8s infinite;
}

.b1{
    width:30px;
    height:30px;
    left:20%;
}

.b2{
    width:20px;
    height:20px;
    left:70%;
    animation-duration:10s;
}

@keyframes up{
    from{
        transform:translateY(0);
    }
    to{
        transform:translateY(-100vh);
    }
}


/* กล่องข้อมูล */

.card{

    background:white;
    width:350px;
    margin:80px auto;
    padding:30px;
    border-radius:40px;
    box-shadow:0 10px 30px #008dcc;
    position:relative;
}


.card img{

    width:150px;
    height:150px;
    border-radius:50%;
    border:8px solid #00c6ff;
}


h1{
    color:#008dcc;
}


.info{

    background:#dffaff;
    padding:15px;
    border-radius:20px;
    margin-top:20px;
    text-align:left;
}


.back{

    display:inline-block;
    margin-top:20px;
    padding:12px 25px;
    background:#00bfff;
    color:white;
    border-radius:25px;
    text-decoration:none;
}

.back:hover{
    background:#008dcc;
}

</style>

</head>

<body>


<div class="bubble b1"></div>
<div class="bubble b2"></div>


<div class="card">

<img src="images/MEITU_20260719_233316491.jpg">


<h1>🐚 ประวัติส่วนตัว</h1>


<div class="info">

<p>👤 ชื่อ : นางสาวชญานิน จันทะรี</p>

<p>🎂 วันเกิด : 11 ตุลาคม 2551</p>

<p>🏠 ที่อยู่ : หมู่บ้านสิรัชชาธานี 299/119</p>

<p>🎨 งานอดิเรก : ฟังเพลง เล่นเกม ดูการ์ตูน</p>

<p>🌊 ความสามารถ : จำคำศัพท์ได้เร็ว</p>

</div>


<a class="back" href="index.html">
⬅ กลับหน้าหลัก
</a>


</div>


</body>
</html>
