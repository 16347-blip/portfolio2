<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title> Portfolio</title>

<style>

body{
    margin:0;
    font-family:tahoma;
    text-align:center;
    background:#dff8ff;
}


/* หน้าปก */
.cover{
    height:350px;
    background:
    linear-gradient(#00bfff99,#008cff99),
    url("images/cover.jpg");

    background-size:cover;
    background-position:center;

    display:flex;
    justify-content:center;
    align-items:center;

    border-radius:0 0 60px 60px;
}


.cover-box{
    color:white;
    background:#ffffff55;
    padding:30px;
    border-radius:30px;
}


.cover h1{
    font-size:45px;
}


/* รูปโปรไฟล์ */

.profile{
    margin-top:-50px;
}


.pearl{

    width:180px;
    height:180px;

    margin:auto;

    padding:10px;

    border-radius:50%;

    background:
    radial-gradient(circle,#fff,#aeefff,#00bfff);

    box-shadow:
    0 0 0 8px white,
    0 5px 20px #008cff;

}


.pearl img{

    width:100%;
    height:100%;

    border-radius:50%;

    object-fit:cover;

}


/* ปุ่ม */

button,label{

    background:#00bfff;

    color:white;

    padding:12px 25px;

    border-radius:25px;

    cursor:pointer;

}


/* เมนู */

.menu a{

    display:inline-flex;

    width:130px;
    height:130px;

    margin:15px;

    border-radius:50%;

    background:white;

    color:#008cff;

    text-decoration:none;

    justify-content:center;

    align-items:center;

    flex-direction:column;

    font-weight:bold;

    box-shadow:0 5px 15px #9eeaff;

}


.menu a:hover{

    background:#00bfff;
    color:white;

}


footer{

    background:#008cff;

    color:white;

    padding:15px;

}


</style>

</head>


<body>


<!-- หน้าปก -->

<header class="cover">

<div class="cover-box">

<h1>🌊 My Portfolio</h1>

<p>แฟ้มสะสมผลงานของฉัน</p>


<label>

🖼️ เปลี่ยนหน้าปก

<input id="coverUpload"
type="file"
accept="image/*"
hidden>

</label>


</div>

</header>



<!-- รูปโปรไฟล์ -->

<div class="profile">


<div class="profile">

<div class="pearl">

<img id="profileImg"
src="images/MEITU_20260719_233316491.jpg">

</div>

<br>

<label>

📷 เปลี่ยนรูปโปรไฟล์

<input id="profileUpload"
type="file"
accept="image/*"
hidden>

</label>

</div>


<!-- เมนู -->

<div class="menu">


<a href="profile.html">
👤
<br>
ประวัติ
</a>


<a href="education.html">
🎓
<br>
การศึกษา
</a>


<a href="works.html">
💻
<br>
ผลงาน
</a>


<a href="certificate.html">
🏆
<br>
เกียรติบัตร
</a>


<a href="contact.html">
📞
<br>
ติดต่อ
</a>


</div>



<footer>

© 2026 My Portfolio 🌊

</footer>




<script>


// เปลี่ยนรูปโปรไฟล์

profileUpload.onchange=function(){

profileImg.src=
URL.createObjectURL(this.files[0]);

}



// เปลี่ยนหน้าปก

coverUpload.onchange=function(){

document.querySelector(".cover").style.backgroundImage=

`url(${URL.createObjectURL(this.files[0])})`;

}


</script>



</body>
</html>
