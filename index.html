<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title> Portfolio</title>

<style>

body{
    margin:0;
    font-family:tahoma;
    text-align:center;
    background:#dff8ff;
}


/* หน้าปก */
.cover{
    height:350px;
    background:
    linear-gradient(#00bfff99,#008cff99),
    url("images/cover.jpg");

    background-size:cover;
    background-position:center;

    display:flex;
    justify-content:center;
    align-items:center;

    border-radius:0 0 60px 60px;
}


.cover-box{
    color:white;
    background:#ffffff55;
    padding:30px;
    border-radius:30px;
}


.cover h1{
    font-size:45px;
}


/* รูปโปรไฟล์ */

.profile{
    margin-top:-50px;
}


.pearl{

    width:180px;
    height:180px;

    margin:auto;

    padding:10px;

    border-radius:50%;

    background:
    radial-gradient(circle,#fff,#aeefff,#00bfff);

    box-shadow:
    0 0 0 8px white,
    0 5px 20px #008cff;

}


.pearl img{

    width:100%;
    height:100%;

    border-radius:50%;

    object-fit:cover;

}


/* ปุ่ม */

button,label{

    background:#00bfff;

    color:white;

    padding:12px 25px;

    border-radius:25px;

    cursor:pointer;

}


/* เมนู */

.menu a{

    display:inline-flex;

    width:130px;
    height:130px;

    margin:15px;

    border-radius:50%;

    background:white;

    color:#008cff;

    text-decoration:none;

    justify-content:center;

    align-items:center;

    flex-direction:column;

    font-weight:bold;

    box-shadow:0 5px 15px #9eeaff;

}


.menu a:hover{

    background:#00bfff;
    color:white;

}


footer{

    background:#008cff;

    color:white;

    padding:15px;

}

    /* ของตกแต่งทะเล */

.fish{
    position:fixed;
    font-size:25px;
    z-index:1;
    animation:swim 15s linear infinite;
}
    
.fish1{
    top:250px;
    left:-100px;
}

.fish2{
    top:450px;
    left:-150px;
    animation-duration:20s;
}

@keyframes swim{
    from{
        left:-150px;
    }
    to{
        left:110%;
    }
}


/* ฟองอากาศ */

.bubble{
    position:fixed;
    bottom:-50px;
    background:white;
    opacity:.5;
    border-radius:50%;
    animation:up 8s infinite;
}

.b1{
    width:30px;
    height:30px;
    left:20%;
}

.b2{
    width:20px;
    height:20px;
    left:70%;
    animation-delay:2s;
}


@keyframes up{

0%{
    transform:translateY(0);
}

100%{
    transform:translateY(-100vh);
}

}


/* ทรายด้านล่าง */

.sand{
    position:fixed;
    bottom:0;
    left:0;
    width:100%;
    height:40px;
    background:#ffe5a0;
    border-radius:50% 50% 0 0;
    z-index:1;

}


/* ปะการัง */

.coral{
    font-size:30px;
    bottom:25px;
}

    
    /* พื้นทราย */
.sand{
    height:35px;
}
    
/* ปูเดิน */
.crab{
    position:fixed;
    left:-100px;
    bottom:35px;
    font-size:25px;
    z-index:6;
    animation:crabMove 15s linear infinite;
}

@keyframes crabMove{
    from{
        left:-100px;
    }
    to{
        left:110%;
    }
}


/* เต่าทะเล */
.turtle{
    position:fixed;
    left:-120px;
    bottom:70px;
    font-size:30px;
    z-index:4;
    animation:turtleMove 25s linear infinite;
}

@keyframes turtleMove{
    from{
        left:-120px;
    }
    to{
        left:110%;
    }
}


/* กล่องสมบัติ */
.treasure{
    position:fixed;
    right:15%;
    bottom:45px;
    font-size:35px;
    z-index:6;
}


    /* เรือโจรสลัด */
.ship{
    position:fixed;
    left:-200px;
    top:150px;
    font-size:40px;
    z-index:3;
    animation:shipMove 30s linear infinite;
}

    

@keyframes shipMove{
    from{
        left:-200px;
    }
    to{
        left:110%;
    }
}


/* หีบสมบัติ */
.chest{
    font-size:35px;
    bottom:50px;
}



/* ปะการัง */
.coral{
    position:fixed;
    bottom:35px;
    left:40%;
    font-size:30px;
    z-index:2;
}


/* ฟองอากาศ */
.bubble{
    position:fixed;
    bottom:-50px;
    background:white;
    border-radius:50%;
    opacity:.5;
    z-index:2;
    animation:bubbleUp 10s infinite;
}

.bubble1{
    width:25px;
    height:25px;
    left:25%;
}

.bubble2{
    width:40px;
    height:40px;
    left:75%;
    animation-delay:3s;
}

@keyframes bubbleUp{
    from{
        transform:translateY(0);
    }
    to{
        transform:translateY(-100vh);
    }
}

    .star{
    position:fixed;
    font-size:25px;
    z-index:1;
    animation:starMove 3s infinite alternate;
}

.star1{
    bottom:80px;
    left:15%;
}

.star2{
    bottom:100px;
    right:15%;
}

@keyframes starMove{
    from{
        transform:rotate(0deg);
    }
    to{
        transform:rotate(30deg);
    }
}

    .small1{
    width:15px;
    height:15px;
    left:20%;
    animation-duration:7s;
}

.small2{
    width:10px;
    height:10px;
    left:50%;
    animation-duration:9s;
}

.small3{
    width:18px;
    height:18px;
    left:80%;
    animation-duration:12s;
}


/* คลื่นทะเล */
.wave{
    position:fixed;
    bottom:35px;
    left:0;
    width:100%;
    height:20px;
    background:#8eeaff;
    border-radius:50%;
    z-index:2;
    opacity:.8;
}


    /* เปลือกหอย */
.shell{
    position:fixed;
    bottom:40px;
    font-size:25px;
    z-index:3;
}

.shell1{
    left:10%;
}

.shell2{
    right:20%;
}


/* สมอเรือ */
.anchor{
    position:fixed;
    top:120px;
    right:10%;
    font-size:40px;
    z-index:2;
}


/* ปลาเล็ก */
.smallfish{
    position:fixed;
    font-size:20px;
    animation:fishMove 12s linear infinite;
    z-index:2;
}

@keyframes fishMove{
    from{
        left:-50px;
    }
    to{
        left:110%;
    }
}


/* แสงใต้น้ำ */
.light{
    position:fixed;
    top:0;
    left:20%;
    width:60%;
    height:200px;
    background:#ffffff33;
    border-radius:50%;
    z-index:0;
}
    
</style>

</head>
