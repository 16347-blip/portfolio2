<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ประวัติการศึกษา</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Prompt',sans-serif;
}

body{
    background:linear-gradient(#c9f2ff,#eafcff,#ffffff);
    overflow-x:hidden;
}

/* ฟองอากาศ */
.bubble{
    position:fixed;
    bottom:-100px;
    border-radius:50%;
    background:rgba(255,255,255,.5);
    animation:float 10s infinite;
}

.bubble:nth-child(1){left:10%;width:25px;height:25px;}
.bubble:nth-child(2){left:30%;width:18px;height:18px;animation-duration:8s;}
.bubble:nth-child(3){left:55%;width:35px;height:35px;animation-duration:12s;}
.bubble:nth-child(4){left:75%;width:20px;height:20px;animation-duration:9s;}
.bubble:nth-child(5){left:90%;width:28px;height:28px;animation-duration:11s;}

@keyframes float{
0%{transform:translateY(0);}
100%{transform:translateY(-110vh);}
}

.container{
    width:90%;
    max-width:750px;
    margin:50px auto;
}

h1{
    text-align:center;
    color:#4ba3d8;
    margin-bottom:30px;
    font-size:38px;
}

.card{
    background:rgba(255,255,255,.85);
    backdrop-filter:blur(8px);
    border-radius:25px;
    padding:20px;
    margin:20px 0;
    box-shadow:0 8px 20px rgba(0,170,255,.15);
    border:2px solid #bcecff;
    transition:.3s;
}

.card:hover{
    transform:translateY(-5px);
}

h2{
    color:#57bde7;
    margin-bottom:10px;
}

p{
    color:#666;
    line-height:1.8;
}

button{
    display:block;
    margin:35px auto;
    background:#74d7ff;
    color:white;
    border:none;
    border-radius:40px;
    padding:15px 35px;
    font-size:18px;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    background:#4bb9e8;
    transform:scale(1.05);
}

.wave{
    font-size:26px;
    text-align:center;
    margin-top:20px;
}
</style>

</head>
<body>

<div class="bubble"></div>
<div class="bubble"></div>
<div class="bubble"></div>
<div class="bubble"></div>
<div class="bubble"></div>

<div class="container">

<h1>🩵🌊 ประวัติการศึกษา 🌊🩵</h1>

<div class="wave">
🐚 🪸 🐬 🌊 🫧 🐠 🌊 🪼
</div>

<div class="card">
<h2>🏫 ประถมศึกษา</h2>
<p>
โรงเรียน วัดพานทอง<br>
ปีการศึกษา 2564
</p>
</div>

<div class="card">
<h2>📚 มัธยมศึกษาตอนต้น</h2>
<p>
โรงเรียน ประชาสงเคราะห์<br>
ปีการศึกษา 2567
</p>
</div>

<div class="card">
<h2>🎓 มัธยมศึกษาตอนปลาย</h2>
<p>
โรงเรียน พานทอง<br>
ปัจจุบันกำลังศึกษาระดับชั้นมัธยมศึกษาปีที่ 6/2
</p>
</div>

<button onclick="location.href='index.html'">
🏠 กลับหน้าหลัก
</button>

</div>

</body>
</html>
